name: daily-journal-update
on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run daily update
        run: python3 daily_update.py
      - name: Commit results
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add history.csv predictions.csv storm_log.csv index.html
          git diff --cached --quiet || git commit -m "daily radar update $(date -u +%F)"
          git push
